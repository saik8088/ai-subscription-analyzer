{% extends "base.html" %}

{% block content %}
<div class="auth-container">
    <div class="auth-card glass-panel">
        <div class="auth-header">
            <div class="logo">
                <i class="fa-solid fa-microchip"></i>
                <h2>AI Analyzer</h2>
            </div>
            <p>Welcome back! Please enter your details.</p>
        </div>
        
        <form action="{{ url_for('login') }}" method="POST" class="auth-form" id="loginForm">
            <div class="input-group">
                <label for="email"><i class="fa-regular fa-envelope"></i> Email</label>
                <input type="email" id="email" name="email" required placeholder="Enter your email" autocomplete="email">
            </div>
            <div class="input-group">
                <label for="password"><i class="fa-solid fa-lock"></i> Password</label>
                <div style="position: relative;">
                    <input type="password" id="password" name="password" required placeholder="••••••••" style="width: 100%; padding-right: 40px;">
                    <i class="fa-regular fa-eye" id="togglePassword" style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; color: var(--text-secondary);"></i>
                </div>
            </div>
            <button type="submit" class="btn btn-primary btn-block">Sign In <i class="fa-solid fa-arrow-right"></i></button>
        </form>
        
        <div class="auth-footer">
            <p>Don't have an account? <a href="{{ url_for('register') }}">Sign up here</a></p>
        </div>
    </div>
</div>

<script>
    const togglePassword = document.querySelector('#togglePassword');
    const password = document.querySelector('#password');

    togglePassword.addEventListener('click', function (e) {
        // toggle the type attribute
        const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
        password.setAttribute('type', type);
        // toggle the eye / eye slash icon
        this.classList.toggle('fa-eye');
        this.classList.toggle('fa-eye-slash');
    });
</script>

{% endblock %}
