{% extends "base.html" %}

{% block extra_head %}
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
{% endblock %}

{% block content %}
{% include 'components/navbar.html' %}

<div class="dashboard-layout">
    <!-- Sidebar / Input Section -->
    <aside class="sidebar glass-panel">
        <h3><i class="fa-solid fa-plus-circle"></i> Add AI Tool</h3>
        <form id="addToolForm" class="tool-form">
            <div class="input-group">
                <label>Tool Name</label>
                <input type="text" id="toolName" required placeholder="e.g. ChatGPT Plus">
            </div>
            <div class="input-group">
                <label>Monthly Cost (₹)</label>
                <input type="number" id="monthlyCost" required placeholder="e.g. 1650" min="0">
            </div>
            <div class="input-group">
                <label>Yearly Cost (₹)</label>
                <input type="number" id="yearlyCost" required placeholder="e.g. 19800" min="0">
            </div>
            <div class="input-group">
                <label>Key Features</label>
                <textarea id="features" required placeholder="e.g. GPT-4, DALL-E 3, Advanced Data Analysis" rows="3"></textarea>
            </div>
            <button type="submit" class="btn btn-primary btn-block"><i class="fa-solid fa-save"></i> Save Subscription</button>
        </form>
    </aside>

    <!-- Main Content Area -->
    <section class="main-content">
        <!-- Settings Bar -->
        <div class="settings-bar glass-panel">
            <div class="input-group inline-group" style="margin-bottom:0;">
                <label for="monthlyBudget"><i class="fa-solid fa-piggy-bank"></i> Monthly Budget (₹):</label>
                <input type="number" id="monthlyBudget" placeholder="Enter your total monthly budget..." min="0">
                <button id="saveBudgetBtn" class="btn btn-secondary btn-sm">Save Budget</button>
            </div>
        </div>

        <div class="stats-overview" style="grid-template-columns: repeat(4, 1fr);">
            <div class="stat-card glass-panel">
                <h4><i class="fa-solid fa-wallet"></i> Total Monthly</h4>
                <p class="amount" id="totalMonthly">₹0.00</p>
            </div>
            <div class="stat-card glass-panel">
                <h4><i class="fa-solid fa-calendar"></i> Total Yearly</h4>
                <p class="amount" id="totalYearly">₹0.00</p>
            </div>
            <div class="stat-card glass-panel highlight-cad">
                <h4><i class="fa-solid fa-chart-pie"></i> Expense Level</h4>
                <p class="amount" id="expenseLevel">N/A</p>
            </div>
            <div class="stat-card glass-panel" id="budgetCard">
                <h4><i class="fa-solid fa-scale-balanced"></i> Budget Remaining</h4>
                <p class="amount" id="budgetRemaining">₹0.00</p>
            </div>
        </div>

        <div class="chart-container glass-panel" style="margin-bottom: 20px; padding: 20px; height: 350px;">
            <canvas id="costChart"></canvas>
        </div>

        <div class="subscriptions-list" id="subscriptionsList">
            <!-- Dynamic Tool Cards Rendered by JS -->
        </div>
    </section>
</div>

{% include 'components/chatbot.html' %}
{% endblock %}
