<!-- Floating AI Chatbot Widget -->
<div class="chat-widget-container">
    <button id="chatToggleBtn" class="chat-toggle-btn glowing-btn">
        <i class="fa-solid fa-robot"></i>
    </button>
    <div class="chat-widget" id="chatWidget" style="display: none;">
        <div class="chat-header" id="chatHeader">
            <span><i class="fa-solid fa-robot"></i> AI Analyst</span>
            <div class="chat-header-actions">
                <i class="fa-solid fa-minus" id="chatMinimizeIcon"></i>
                <i class="fa-solid fa-times" id="chatCloseIcon"></i>
            </div>
        </div>
        <div class="chat-body" id="chatBody">
            <div class="chat-messages" id="chatMessages">
                <div class="message ai-message">
                    <p>Hello {{ user_name }}! I'm your AI subscription analyst. I can review your tech stack and give you cost-saving advice in INR. How can I help today?</p>
                </div>
            </div>
            <div class="chat-input-area">
                <input type="text" id="chatInput" placeholder="Ask about your subscriptions...">
                <button id="sendChatBtn"><i class="fa-solid fa-paper-plane"></i></button>
            </div>
        </div>
    </div>
</div>
